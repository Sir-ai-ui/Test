<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elektroplanung – Grundriss</title>
<style>
  :root{
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
    --line:#d7dbdf; --line2:#e4e7ea; --ink:#1c2024; --ink2:#374151; --mut:#9aa1a8; --mut2:#6b7280;
    --hi:#eef1f4; --accent:#2563eb;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--sans);color:var(--ink);background:#e9ebee;overflow:hidden;-webkit-font-smoothing:antialiased}
  input,select,textarea,button{font-family:inherit}
  input:focus,select:focus,textarea:focus{border-color:#9aa3ad}
  button{font-family:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#c7cdd3;border-radius:6px;border:2px solid #fff}
  .app{display:flex;flex-direction:column;height:100vh;user-select:none}
  .topbar{min-height:54px;flex:none;display:flex;align-items:center;flex-wrap:wrap;gap:9px 14px;padding:8px 16px;background:#fff;border-bottom:1px solid var(--line);z-index:5}
  .tbtn{display:flex;align-items:center;gap:6px;height:34px;padding:0 12px;border:1px solid var(--line);background:#fff;border-radius:7px;font-size:13px;font-weight:500;color:var(--ink2);cursor:pointer;white-space:nowrap}
  .tbtn:hover{background:#f6f7f8}
  .tbtn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .meta{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12px;color:#5b636b}
  .subbar{flex:none;display:flex;align-items:center;gap:8px;padding:7px 14px;background:#fff;border-bottom:1px solid var(--line);overflow-x:auto;overflow-y:hidden;min-height:48px;z-index:4}
  .subbar::-webkit-scrollbar{height:6px}
  .subbar select{outline:none}
  .subbar select:focus{border-color:#9aa3ad}
  .wizbar{flex:none;display:flex;align-items:center;gap:2px;padding:6px 14px;background:#fbfcfd;border-bottom:1px solid var(--line);overflow-x:auto;overflow-y:hidden;min-height:42px;z-index:3}
  .wizbar::-webkit-scrollbar{height:5px}
  .wizstep{display:flex;align-items:center;gap:8px;height:30px;padding:0 11px 0 8px;border:1px solid transparent;border-radius:8px;background:transparent;cursor:pointer;flex:none;white-space:nowrap;color:#6b7280;font-size:12.5px;font-weight:600}
  .wizstep:hover{background:#eef1f4}
  .wizstep.done{color:#3a4a52}
  .wizstep.current{background:#fff;border-color:#2563eb;color:#1c2024;box-shadow:0 1px 4px rgba(37,99,235,.14)}
  .wizstep .wn{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--mono);flex:none;background:#e4e7ea;color:#9aa1a8}
  .wizstep.done .wn{background:#16a34a;color:#fff}
  .wizstep.current .wn{background:#2563eb;color:#fff}
  .wizsep{flex:none;width:14px;height:1px;background:#d7dbdf}
  .wizdone{display:flex;align-items:center;gap:7px;flex:none;color:#15803d;font-size:12.5px;font-weight:600;padding:0 6px}
  .body{flex:1;display:flex;min-height:0}
  .left{width:222px;flex:none;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;overflow-y:auto}
  .right{width:344px;flex:none;background:#fff;border-left:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
  .resizer{flex:none;width:7px;cursor:col-resize;background:transparent;position:relative;z-index:4;touch-action:none}
  .resizer:hover,.resizer.drag{background:rgba(37,99,235,.12)}
  .resizer::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:28px;border-radius:2px;background:#d2d7dc;transition:.12s}
  .resizer:hover::after,.resizer.drag::after{background:var(--accent);height:42px}
  .sechead{font-size:10px;font-weight:700;letter-spacing:.09em;color:var(--mut);padding:0 6px 8px}
  .toolrow{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:#3a4250}
  .toolrow:hover{background:#f6f7f8}
  .toolrow.active{background:var(--hi);font-weight:600}
  .toolrow .ic{display:flex;width:24px;height:22px;align-items:center;justify-content:center;flex:none}
  .toolrow .key{font-family:var(--mono);font-size:11px;color:#b4bac0}
  .field-label{display:block;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
  .inp{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:13.5px;outline:none;background:#fff}
  .sel{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:13px;background:#fff;outline:none;color:var(--ink2)}
  .canvas{flex:1;position:relative;min-width:0;background:#f4f5f6;overflow:hidden;touch-action:none}
  .scene{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
  .scene img{position:absolute;left:0;top:0;user-select:none;pointer-events:none}
  .scene svg{position:absolute;left:0;top:0;overflow:visible;pointer-events:none}
  .zoombar{position:absolute;left:14px;bottom:14px;display:flex;gap:6px;background:#fff;padding:6px;border-radius:9px;border:1px solid var(--line);box-shadow:0 2px 8px rgba(20,25,30,.07)}
  .zoombar button{height:30px;border:0;background:#f1f3f5;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--ink2);padding:0 12px}
  .zoombar button.sq{width:30px;padding:0;font-size:17px}
  .floorbar{position:absolute;top:14px;left:14px;display:flex;align-items:center;gap:4px;background:#fff;padding:5px 7px;border-radius:9px;border:1px solid var(--line);box-shadow:0 2px 8px rgba(20,25,30,.07);max-width:calc(100% - 28px);overflow-x:auto}
  .floorbar .lbl{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--mut);padding:0 4px;flex:none}
  .floorbar .ftab{height:30px;padding:0 12px;border:0;background:transparent;border-radius:6px;font-size:12.5px;font-weight:500;color:var(--ink2);cursor:pointer;white-space:nowrap;flex:none}
  .floorbar .ftab:hover{background:#f1f3f5}
  .floorbar .fgrp{display:flex;align-items:center;background:#eef1f4;border-radius:6px;flex:none}
  .floorbar .fname{height:30px;border:0;background:transparent;font-size:12.5px;font-weight:600;color:var(--ink);padding:0 6px 0 10px;outline:none;min-width:64px;max-width:150px;width:90px}
  .floorbar .addf{height:30px;width:30px;padding:0;font-size:17px;font-weight:700;border:0;background:#f1f3f5;border-radius:6px;cursor:pointer;color:var(--ink2);flex:none}
  .hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(28,32,36,.92);color:#fff;padding:8px 15px;border-radius:8px;font-size:12.5px;font-weight:500;box-shadow:0 3px 12px rgba(0,0,0,.18);white-space:nowrap;pointer-events:none;z-index:3}
  .dropzone{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--mut);text-align:center;padding:40px}
  .dropzone .box{border:2.5px dashed #c2c8ce;border-radius:18px;padding:46px 60px;background:rgba(255,255,255,.5);max-width:520px;transition:.12s}
  .dropzone.over .box{border-color:var(--accent);background:rgba(37,99,235,.06)}
  .tabbtn{padding:8px 14px;border:0;border-radius:7px 7px 0 0;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--mut);border-bottom:2px solid transparent}
  .tabbtn.active{color:var(--ink);font-weight:600;border-bottom-color:var(--accent)}
  .scrollbody{flex:1;overflow-y:auto;min-height:0}
  .stat{flex:1;background:#f6f7f8;border-radius:9px;padding:11px 12px}
  .stat .k{font-size:10.5px;color:var(--mut);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
  .stat .v{font-size:21px;font-weight:600;font-family:var(--mono)}
  .row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#f9fafb;border-radius:8px}
  .listrow{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:7px;cursor:pointer}
  .listrow:hover{background:#f6f7f8}
  .modal-bg{position:fixed;inset:0;background:rgba(28,32,36,.28);display:flex;align-items:center;justify-content:center;z-index:40}
  .modal{background:#fff;border-radius:12px;padding:22px;width:320px;box-shadow:0 12px 40px rgba(0,0,0,.25)}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 16px;border-radius:9px;font-size:13px;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.25);opacity:0;transition:.2s;pointer-events:none}
  .toast.show{opacity:1}
  /* Dunkelmodus: globale Invertierung; Plan-Overlay (Symbol-/Kabelfarben) wird zurück­invertiert, damit Farben echt bleiben. */
  body.dark{filter:invert(1) hue-rotate(180deg);background:#fff}
  body.dark #overlay{filter:invert(1) hue-rotate(180deg)}
  @media print{ body.dark,body.dark #overlay{filter:none!important} }
  .dot{width:11px;height:11px;border-radius:3px;flex:none}
  .iconbtn{width:22px;height:22px;border:0;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:5px;flex:none;color:#9aa1a8}
  .iconbtn:hover{background:#eef0f2;color:var(--ink2)}
  @media print{
    .topbar,.left,.right,.zoombar,.floorbar,.hint,.dropzone,.scrim,.mobtoggle,.subbar,.wizbar{display:none!important}
    .app,.body,.canvas{position:static;height:auto;overflow:visible}
    .canvas{background:#fff}
    body.printVerteiler .app{display:none!important}
    body.printVerteiler #verteilerOverlay{position:static!important;display:block!important;background:#fff;overflow:visible}
    body.printVerteiler #verteilerOverlay .v-sheet{box-shadow:none!important;margin:0!important;max-width:none!important}
    body.printVerteiler .v-noprint{display:none!important}
    body.printVerteiler .v-printonly{display:block!important}
    body.printSheet .app{display:none!important}
    body.printSheet #sheetOverlay{position:static!important;display:block!important;background:#fff;overflow:visible;padding:0!important}
    body.printSheet #sheetOverlay .v-sheet{box-shadow:none!important;margin:0!important;max-width:none!important}
    body.printSheet .v-noprint{display:none!important}
  }
  .mobtoggle{display:none}
  .scrim{position:fixed;inset:0;background:rgba(20,25,30,.4);z-index:14;display:none}
  .scrim.show{display:block}
  @media (max-width:900px){
    .topbar{height:auto;min-height:50px;flex-wrap:wrap;padding:7px 10px;gap:8px}
    .topbar .hide-sm{display:none!important}
    .mobtoggle{display:flex!important;align-items:center;justify-content:center;width:40px;height:34px;padding:0;font-size:18px}
    .left,.right{position:fixed;top:0;bottom:0;z-index:15;box-shadow:0 0 50px rgba(0,0,0,.22);transition:transform .24s ease}
    .left{left:0;width:min(86vw,300px);transform:translateX(-103%)}
    .right{right:0;width:min(92vw,366px);transform:translateX(103%)}
    .left.open,.right.open{transform:translateX(0)}
    .resizer{display:none!important}
  }
  @media (min-width:901px){ .left,.right{transform:none!important} .scrim{display:none!important} }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <button class="tbtn mobtoggle" id="mobLeft" title="Symbole platzieren">☰</button>
    <div style="display:flex;align-items:baseline;gap:9px">
      <span style="font-weight:700;font-size:15px">Elektroplanung</span>
    </div>
    <div class="hide-sm" style="width:1px;height:24px;background:var(--line2)"></div>
    <div id="projektBar" style="display:flex;align-items:center;gap:7px"></div>
    <div class="hide-sm" style="width:1px;height:24px;background:var(--line2)"></div>
    <div class="meta hide-sm" style="gap:11px;padding:0 11px;height:30px;border:1px solid var(--line2);border-radius:7px;background:#fbfcfc">
      <span><span style="color:var(--mut)">Maßstab </span><span id="lblScale" style="color:var(--ink);font-weight:500">—</span></span>
      <span style="width:1px;height:15px;background:var(--line2)"></span>
      <span><span style="color:var(--mut)">Zoom </span><span id="lblZoom" style="color:var(--ink);font-weight:500">—</span></span>
    </div>
    <div id="levelBar" title="Erfahrungsstufe – passt den Funktionsumfang an" style="display:flex;align-items:center;height:30px;border:1px solid var(--line2);border-radius:7px;overflow:hidden"></div>
    <div style="flex:1"></div>
    <div id="planCtl" class="hide-sm" style="display:none;align-items:center;gap:9px;height:34px;padding:0 6px 0 11px;margin-right:2px;border:1px solid var(--line);border-radius:7px;background:#fff">
      <span style="font-size:12px;color:var(--mut)">Plan</span>
      <input id="opacity" type="range" min="0.15" max="1" step="0.05" value="1" style="width:74px;accent-color:#6b7280">
      <span style="width:1px;height:18px;background:var(--line2)"></span>
      <button id="btnRemovePlan" title="Grundriss dieser Etage entfernen – platzierte Symbole, Räume und Kabel bleiben erhalten" style="display:flex;align-items:center;gap:5px;height:25px;padding:0 9px;border:1px solid #eccac6;background:#fdf3f3;border-radius:6px;font-size:12px;font-weight:500;color:#b4453c;cursor:pointer;white-space:nowrap">✕ Entfernen</button>
    </div>
    <span id="saveStatus" style="font-size:12px;color:var(--mut);min-width:96px;text-align:right;white-space:nowrap"></span>
    <button class="tbtn" id="btnImport" title="Grundriss für die aktive Etage importieren">⤒ Plan importieren</button>
    <button class="tbtn" id="btnExport" title="Projekt sichern/laden · PNG, CSV oder PDF exportieren">⤓ Export ▾</button>
    <div class="hide-sm" style="width:1px;height:22px;background:var(--line2)"></div>
    <button class="tbtn" id="btnUndo" title="Rückgängig (Strg+Z)">↺ Zurück</button>
    <button class="tbtn" id="btnRedo" title="Wiederherstellen (Strg+Umschalt+Z / Strg+Y)">↻ Vor</button>
    <div class="hide-sm" style="width:1px;height:22px;background:var(--line2)"></div>
    <button class="tbtn" id="btnDash" title="Projekt-Übersicht: Status, Mengen, Prüfung (Strg+J)" style="padding:0 12px">▣ Übersicht</button>
    <button class="tbtn" id="btnViews" title="Verteiler, Schnitt, Legende, Raumbuch & Versionen">☷ Pläne & Berichte ▾</button>
    <button class="tbtn" id="btnPalette" title="Befehle & Schnellsuche – alles finden & hinspringen" style="padding:0 12px">⌕ Suchen</button>
    <div class="hide-sm" style="width:1px;height:22px;background:var(--line2)"></div>
    <button class="tbtn" id="btnDark" title="Dunkelmodus (Tag/Nacht) umschalten" style="padding:0 11px;font-size:15px">◐</button>
    <button class="tbtn" id="btnManual" title="Handbuch öffnen (neuer Tab)" style="padding:0 12px">📖 Handbuch</button>
    <button class="tbtn" id="btnHelp" title="Anleitung & Tastenkürzel (?)" style="padding:0 12px">? Hilfe</button>
    <button class="tbtn mobtoggle" id="mobRight" title="Eigenschaften & Stromkreise">▤</button>
  </header>

  <div class="subbar" id="subbar"></div>
  <div class="wizbar" id="wizbar"></div>

  <div class="body">
    <aside class="left" id="leftPanel"></aside>
    <div class="resizer hide-sm" id="resizeLeft" title="Breite ziehen · Doppelklick: Standardbreite"></div>

    <main class="canvas" id="canvasArea">
      <div class="scene" id="scene">
        <img id="planImg" alt="" draggable="false" style="display:none">
        <svg id="overlay"></svg>
      </div>
      <div class="dropzone" id="dropzone">
        <div class="box">
          <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#aab0b6" stroke-width="1.5" style="margin-bottom:14px">
            <path d="M3 16.5V18a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-1.5"/><path d="M12 3v12"/><path d="M8 7l4-4 4 4"/>
          </svg>
          <div style="font-size:15px;font-weight:600;color:var(--ink2)">Grundriss importieren</div>
          <div id="dropHint" style="font-size:13px;line-height:1.55;margin-top:8px">Bild hierher ziehen oder <b style="color:var(--accent)">zum Auswählen klicken</b><br>PNG · JPG · SVG · WEBP</div>
        </div>
      </div>
      <div class="floorbar" id="floorBar"></div>
      <div class="zoombar">
        <button class="sq" id="zOut">−</button>
        <button id="zFit">Einpassen</button>
        <button class="sq" id="zIn">+</button>
      </div>
      <div class="hint" id="hint" style="display:none"></div>
    </main>
    <div class="resizer hide-sm" id="resizeRight" title="Breite ziehen · Doppelklick: Standardbreite"></div>

    <aside class="right" id="rightPanel">
      <div style="display:flex;padding:10px 12px 0;gap:4px;flex:none">
        <button class="tabbtn active" id="tabProps">Eigenschaften</button>
        <button class="tabbtn" id="tabList">Stückliste</button>
        <button class="tabbtn" id="tabCheck">Prüfung<span id="checkBadge" style="display:none;margin-left:6px;font-size:10.5px;font-weight:700;font-family:var(--mono);color:#fff;background:#c0322a;border-radius:9px;padding:1px 6px;vertical-align:1px"></span></button>
      </div>
      <div style="height:1px;background:var(--line2);flex:none"></div>
      <div class="scrollbody" id="rightBody"></div>
      <div id="circuitPanel" style="border-top:1px solid var(--line2);padding:12px 16px 14px;flex:none;background:#fbfcfc">
        <div style="display:flex;align-items:center;margin-bottom:9px">
          <span style="font-size:10.5px;font-weight:700;letter-spacing:.06em;color:var(--mut);flex:1">STROMKREISE</span>
          <button class="tbtn" id="addCircuit" style="height:26px;padding:0 10px;font-size:12px">+ Neu</button>
        </div>
        <div id="circuitList" style="display:flex;flex-direction:column;gap:4px;max-height:172px;overflow-y:auto"></div>
      </div>
    </aside>
  </div>
</div>
<input type="file" id="fileInput" accept="image/*" hidden>
<input type="file" id="projImport" accept=".json,application/json" hidden>
<div class="scrim" id="scrim"></div>
<div id="calibHost"></div>
<div id="verteilerHost"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";
const $=s=>document.querySelector(s);
const SVGNS='http://www.w3.org/2000/svg';
const SVG_TAGS=new Set(['svg','g','path','line','circle','rect','text','polyline','polygon','ellipse','tspan','defs','use']);
const ATTR={strokeWidth:'stroke-width',strokeLinejoin:'stroke-linejoin',strokeLinecap:'stroke-linecap',strokeDasharray:'stroke-dasharray',textAnchor:'text-anchor',dominantBaseline:'dominant-baseline',fontSize:'font-size',fontWeight:'font-weight',fontFamily:'font-family',fillOpacity:'fill-opacity',strokeOpacity:'stroke-opacity'};
function h(tag,props){
  const kids=[].slice.call(arguments,2);
  const el=SVG_TAGS.has(tag)?document.createElementNS(SVGNS,tag):document.createElement(tag);
  if(props) for(const k in props){
    const v=props[k]; if(v==null||v===false) continue;
    if(k==='style'&&typeof v==='object'){ for(const s in v) el.style[s]=v[s]; }
    else if(k==='className') el.setAttribute('class',v);
    else if(k.slice(0,2)==='on'&&typeof v==='function') el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(typeof v==='function') continue;
    else el.setAttribute(ATTR[k]||k,v);
  }
  flatAppend(el,kids); return el;
}
function flatAppend(el,kids){ for(const c of kids){ if(c==null||c===false) continue; if(Array.isArray(c)) flatAppend(el,c); else el.appendChild(c.nodeType?c:document.createTextNode(String(c))); } }
function clear(el){ while(el.firstChild) el.removeChild(el.firstChild); }

/* ============== Daten ============== */
const PALETTE=['#2563eb','#dc2626','#16a34a','#d97706','#7c3aed','#0891b2','#db2777','#65a30d','#0d9488','#9333ea'];
const KNX_GREEN='#15803d';
const TYPES={
  lichtquelle:{name:'Lichtquelle (Decke)',prefix:'L'}, lichtquelle_dim:{name:'Lichtquelle dimmbar',prefix:'LD'}, lichtquelle_wand:{name:'Lichtquelle Wand',prefix:'WL'},
  schalter:{name:'Lichtschalter',prefix:'S'}, taster:{name:'Taster',prefix:'T'}, taster4:{name:'Taster 4-fach',prefix:'T4'},
  steckdose:{name:'Steckdose',prefix:'SD'}, steckdose2:{name:'Steckdose 2-fach',prefix:'SD2'}, steckdose5:{name:'Steckdose 5-fach',prefix:'SD5'}, steckdose_schalt:{name:'Steckdose schaltbar',prefix:'SDS'}, steckdose_stark:{name:'Starkstrom 400V',prefix:'ST'},
  bewegungsmelder:{name:'Bewegungsmelder',prefix:'BM'}, praesenzmelder:{name:'Präsenzmelder',prefix:'PM'}, rauchmelder:{name:'Rauchmelder',prefix:'RM'}, hitzemelder:{name:'Hitzemelder',prefix:'HM'}, temperatur:{name:'Temperaturfühler',prefix:'TF'}, co2sensor:{name:'CO₂-Sensor',prefix:'CO2'},

/* Fachbegriff-Glossar für die Kontext-Hilfe (ⓘ). key → {title, text}. Bewusst in Alltagssprache. */
const GLOSSARY={
  stromkreis:{title:'Stromkreis',text:'Eine von einer Sicherung abgesicherte Gruppe von Verbrauchern. Fällt die Sicherung, ist nur dieser Kreis stromlos. Faustregel: Licht und Steckdosen trennen, Großgeräte einzeln.'},
  uv:{title:'Unterverteiler (UV)',text:'Eine zusätzliche Verteilung, z. B. je Etage oder Wohnung. Sie wird über eine Steigleitung vom Hauptverteiler gespeist und verteilt den Strom vor Ort auf die Stromkreise – das spart lange Leitungswege.'},
  hv:{title:'Hauptverteiler (HV)',text:'Die zentrale Verteilung des Gebäudes (Zählerschrank). Von hier gehen die Steigleitungen zu den Unterverteilern bzw. direkt zu den Stromkreisen.'},
  steigpunkt:{title:'Steigpunkt / Durchführung',text:'Ein Wand- oder Deckendurchbruch, durch den Leitungen von einer Etage zur nächsten geführt werden. Zwei Steigpunkte auf verschiedenen Etagen werden verknüpft – das Programm rechnet die Steiglänge automatisch in den Kabelbedarf.'},
  steigleitung:{title:'Steigleitung',text:'Die senkrechte Leitung zwischen zwei Etagen (durch verknüpfte Steigpunkte). Versorgt meist einen Unterverteiler. Höhe/Weite zwischen den Punkten bestimmt die zusätzliche Kabellänge.'},
  rcd:{title:'FI-Schutzschalter (RCD)',text:'Schaltet bei einem Fehlerstrom blitzschnell ab und schützt vor lebensgefährlichem Stromschlag. Für Steckdosenkreise im Wohnbereich (≤ 32 A) vorgeschrieben – 30 mA Auslösestrom.'},
  ls:{title:'Leitungsschutzschalter (LS / Sicherung)',text:'Der „Automat" im Verteiler. Schützt die Leitung vor Überlast und Kurzschluss. Typ B16 = 16 A, übliche Auslösecharakteristik B. Der Wert muss zum Leitungsquerschnitt passen.'},
  querschnitt:{title:'Querschnitt (mm²)',text:'Die Dicke der Kupferadern. Je höher der Sicherungsstrom, desto dicker muss das Kabel sein: 1,5 mm² für 16 A (Licht), 2,5 mm² für 16–20 A (Steckdosen), mehr für Großgeräte. Zu dünn = Brandgefahr.'},
  spannungsfall:{title:'Spannungsfall',text:'Auf langen, dünnen Leitungen „verliert" sich Spannung. Richtwert: höchstens 3 % bis zur Steckdose. Abhilfe: größerer Querschnitt oder kürzerer Weg.'},
  phase:{title:'Außenleiter (L1 / L2 / L3)',text:'Die drei Phasen des Drehstromnetzes. Stromkreise sollten gleichmäßig auf alle drei verteilt werden (Phasenbilanz), damit der Neutralleiter nicht überlastet wird.'},
  schieflast:{title:'Phasenschieflast',text:'Wenn eine der drei Phasen viel stärker belastet ist als die anderen. Belastet den Neutralleiter und das Netz einseitig. Das Programm verteilt automatisch und warnt bei großer Schieflast.'},
  drehstrom:{title:'Drehstrom (400 V)',text:'Starkstrom über alle drei Außenleiter – nötig für Herd, Durchlauferhitzer, große Maschinen. Wird mit einem dreiphasigen Automaten (z. B. 3~ B16) abgesichert.'},
  massstab:{title:'Maßstab',text:'Das Verhältnis von Pixeln im Plan zu echten Metern. Erst mit gesetztem Maßstab kann das Programm Längen, Flächen und Abstände berechnen. Werkzeug „Maßstab": eine bekannte Strecke abklicken.'},
  verlegeebene:{title:'Verlegeebene',text:'Ob ein Kabel über die Decke oder den Boden geführt wird. Bestimmt zusammen mit der Montagehöhe den Höhenzuschlag auf die Kabellänge. Je Stromkreis automatisch (Licht → Decke, sonst Boden) oder manuell wählbar.'},
  verschnitt:{title:'Verschnitt & Reserve',text:'Aufschläge auf die reine Messlänge: Reserve je Anschluss (zum Auflegen) und ein Prozentsatz Verschnitt (Reststücke). So entspricht die Bestellmenge der Praxis statt der theoretischen Strecke.'},
  ip:{title:'Schutzart (IP)',text:'Gibt an, wie gut ein Gerät gegen Staub und Wasser geschützt ist. In Feuchträumen (Bad, außen) mindestens IP44 (spritzwassergeschützt). IP20 = nur für trockene Innenräume.'},
  knx:{title:'KNX-Bus',text:'Ein Gebäudebussystem: Taster, Melder und Aktoren kommunizieren über eine gemeinsame grüne Busleitung statt über klassische Schalterdrähte. Erlaubt flexible, programmierbare Steuerung von Licht, Beschattung und Heizung.'},
  aktor:{title:'KNX-Aktor',text:'Das Schalt-/Stellglied im Verteiler (Reiheneinbau). Empfängt Befehle über den Bus und schaltet, dimmt oder fährt die angeschlossene Last. Hat mehrere Kanäle – einer je Last.'},
  ga:{title:'Gruppenadresse (GA)',text:'Die „Funktionsadresse" im KNX, über die ein Sensor (z. B. Taster) und ein Aktor-Kanal verknüpft werden. Aufbau Hauptgruppe/Mittelgruppe/Untergruppe, z. B. 1/2/3.'},
  dimmgruppe:{title:'Dimmgruppe',text:'Mehrere Leuchten, die gemeinsam über einen Dimmer geregelt werden. Sie teilen sich denselben Schalt-/Dimmkanal und werden zusammen heller/dunkler.'},
};

   Same-origin: das Backend liefert dieses Frontend selbst aus, daher /api/...
   Kein Backend erreichbar -> Offline-Modus mit localStorage (unverändert). */
const PKEY='elplan_projekt', TKEY='elplan_token';
const Api={
  token:null,
  loadToken(){ try{ this.token=localStorage.getItem(TKEY)||null; }catch(e){ this.token=null; } return this.token; },
  setToken(t){ this.token=t||null; try{ if(t)localStorage.setItem(TKEY,t); else localStorage.removeItem(TKEY); }catch(e){} },
  async _json(method,path,body){
    const opt={method,headers:{}};
    if(this.token)opt.headers['Authorization']='Bearer '+this.token;
    if(body!==undefined){ opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
    const r=await fetch('/api'+path,opt);
    if(r.status===401){ const e=new Error('unauthorized'); e.status=401; throw e; }
    if(!r.ok){ let msg='HTTP '+r.status; try{ const j=await r.json(); if(j&&j.detail)msg=j.detail; }catch(_){} const e=new Error(msg); e.status=r.status; throw e; }
    return r.status===204?null:r.json();
  },
  async health(){
    for(let attempt=0;attempt<3;attempt++){
      const c=new AbortController(); const t=setTimeout(()=>c.abort(),8000);
      try{ const r=await fetch('/api/health',{signal:c.signal,cache:'no-store'}); clearTimeout(t);
        if(r.ok){ const j=await r.json(); if(j&&j.status==='ok')return true; }
      }catch(e){ clearTimeout(t); }
      await new Promise(res=>setTimeout(res,700));
    }
    return false;
  },
  register(email,password,name,einladung_token){ return this._json('POST','/auth/register',{email,password,name,einladung_token:einladung_token||null}); },
  login(email,password){ return this._json('POST','/auth/login',{email,password}); },
  me(){ return this._json('GET','/auth/me'); },
  listProjekte(){ return this._json('GET','/projekte'); },
  getProjekt(id){ return this._json('GET','/projekte/'+id); },
  createProjekt(name,daten){ return this._json('POST','/projekte',{name,daten:daten||{}}); },
  updateProjekt(id,patch){ return this._json('PUT','/projekte/'+id,patch); },
  deleteProjekt(id){ return this._json('DELETE','/projekte/'+id); },
  listMitglieder(id){ return this._json('GET','/projekte/'+id+'/mitglieder'); },
  shareProjekt(id,email,rolle){ return this._json('POST','/projekte/'+id+'/mitglieder',{email,rolle}); },
  updateMitglied(id,userId,rolle){ return this._json('PUT','/projekte/'+id+'/mitglieder/'+userId,{rolle}); },
  removeMitglied(id,userId){ return this._json('DELETE','/projekte/'+id+'/mitglieder/'+userId); },
  listEinladungen(id){ return this._json('GET','/projekte/'+id+'/einladungen'); },
  inviteEmail(id,email,rolle){ return this._json('POST','/projekte/'+id+'/einladungen',{email,rolle}); },
  revokeEinladung(id,token){ return this._json('DELETE','/projekte/'+id+'/einladungen/'+encodeURIComponent(token)); },
  einladungInfo(token){ return this._json('GET','/einladungen/'+encodeURIComponent(token)); },
  einladungAnnehmen(token){ return this._json('POST','/einladungen/'+encodeURIComponent(token)+'/annehmen'); },
  fileUrl(id){ return '/api/dateien/'+id+'/inhalt'+(this.token?('?token='+encodeURIComponent(this.token)):''); },
  async uploadDatei(projektId,file,etage){ const fd=new FormData(); fd.append('datei',file); fd.append('etage',etage||''); const headers={}; if(this.token)headers['Authorization']='Bearer '+this.token; const r=await fetch('/api/projekte/'+projektId+'/dateien',{method:'POST',body:fd,headers}); if(r.status===401){const e=new Error('unauthorized');e.status=401;throw e;} if(!r.ok)throw new Error('HTTP '+r.status); return r.json(); },
  deleteDatei(id){ return this._json('DELETE','/dateien/'+id); },
  adminUsers(){ return this._json('GET','/admin/users'); },
  adminCreateUser(email,password,name,is_admin){ return this._json('POST','/admin/users',{email,password,name,is_admin:!!is_admin}); },
  adminUpdateUser(id,patch){ return this._json('PUT','/admin/users/'+id,patch); },
  adminResetPwd(id,password){ return this._json('POST','/admin/users/'+id+'/passwort',{password}); },
  adminDeleteUser(id){ return this._json('DELETE','/admin/users/'+id); },
  adminProjekte(){ return this._json('GET','/admin/projekte'); },
};

        catch(e){ f.planFileId=null; f.planURL=url; this.toast('Upload fehlgeschlagen – Plan nur in dieser Sitzung'); }
      } else { f.planFileId=null; f.planURL=url; }

    const rn=e=>{const r=f.rooms.length?this._roomOfOn(f,e):null;return r?(r.name||(ROOM_TYPES[r.type]||{}).name):'';};
    f.elements.forEach(e=>rows.push([e.label,(TYPES[e.type]||{name:e.type}).name,ausf(e),e.model,e.watt,cn(e.circuit),rn(e),e.dim,e.height,e.schaltung,e.ip,e.status||'Geplant',e.note,e.x,e.y]));

  /* ============== Normprüfung ============== */

  suggestBreaker(c){

  /* Gebäudeweite Element-Liste eines Stromkreises (alle Etagen) */

  _stdMm2:[1.5,2.5,4,6,10,16,25],

  /* Gebäudeweiter Prüflauf (für Normbericht): globale Checks einmal + Raum/Etage je Etage */

      const socks=els.filter(e=>GRP.socket(e.type)), lights=els.filter(e=>GRP.light(e.type)), bigs=els.filter(e=>GRP.big(e.type));

  /* ============== Datensicherung: Datei-Export/Import + Auto-Sicherung ============== */
  _dateStamp(){ const d=new Date(),p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes()); },
  _safeName(s){ return (String(s||'Elektroplanung').replace(/[^\w\u00c0-\u024f -]+/g,'').trim().replace(/\s+/g,'_'))||'Elektroplanung'; },
  exportProjekt(){ const daten=this.collectDaten(); const payload={app:'elektroplanung',format:1,exportedAt:Date.now(),projektName:this._projName(),daten}; let json; try{ json=JSON.stringify(payload); }catch(e){ this.toast('Export fehlgeschlagen'); return; }
    const blob=new Blob([json],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=this._safeName(this._projName())+'_'+this._dateStamp()+'.elplan.json'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),3000);

  triggerImport(){ const inp=$('#projImport'); if(inp){ inp.value=''; inp.click(); } },
  importProjektFile(file){ if(!file)return; const rd=new FileReader();
    rd.onload=()=>{ let obj; try{ obj=JSON.parse(rd.result); }catch(e){ this.toast('Datei nicht lesbar \u2013 keine g\u00fcltige .elplan.json'); return; }
      const d=(obj&&obj.daten&&Array.isArray(obj.daten.floors))?obj.daten:((obj&&Array.isArray(obj.floors))?obj:null);
      if(!d){ this.toast('Unbekanntes Format \u2013 das ist keine Projekt-Sicherung'); return; }
      const c=this._datenCounts(d); const nm=(obj&&obj.projektName)||'Sicherung';
      if(!window.confirm('\u201e'+nm+'\u201c laden?\n'+c.floors+' Etage(n) \u00b7 '+c.el+' Elemente \u00b7 '+c.cab+' Leitungen \u00b7 '+c.circuits+' Stromkreise\n\nDie aktuelle Planung wird ersetzt (vorher automatisch gesichert; \u201eZur\u00fcck\u201c macht es r\u00fcckg\u00e4ngig).'))return;
      this._autoBackup('vor Import'); this.pushUndo();
      this.st.selected=null;this.st.selEls=[];this.st.draft=null;this.st.mouse=null;this.st.calib=null;this.st.showCalib=false;
      this.applyDaten(JSON.parse(JSON.stringify(d))); this.setPlanImg(); this.renderCalib(); this.renderFloors(); this.allRender(); if(!this.fl().view)this.fit(); this.persist();
      if(this.st.versionsOpen)this.renderVersions();

    rd.readAsText(file); },
  /* --- Automatische Sicherungen (rotierend, lokal) --- */
  BAKKEY: KEY+'_autobak', BAK_MAX:10, BAK_MIN_MS:120000,
  _stripPlans(daten){ const d=JSON.parse(JSON.stringify(daten)); (d.floors||[]).forEach(f=>{ delete f.planURL; }); return d; },
  _listBackups(){ try{ const a=JSON.parse(localStorage.getItem(this.BAKKEY)||'[]'); return Array.isArray(a)?a:[]; }catch(e){ return []; } },
  _writeBackups(list){ try{ localStorage.setItem(this.BAKKEY,JSON.stringify(list)); return true; }catch(e){ let l=list.slice(); while(l.length>1){ l.shift(); try{ localStorage.setItem(this.BAKKEY,JSON.stringify(l)); return true; }catch(_){} } return false; } },
  _autoBackup(reason){ try{ const daten=this._stripPlans(this.collectDaten()); const c=this._datenCounts(daten); if(c.el+c.cab===0&&c.floors<=1)return;
      const list=this._listBackups(); const last=list[0];
      if(last&&JSON.stringify(last.daten)===JSON.stringify(daten)){ this._lastBak=Date.now(); return; }
      list.unshift({ts:Date.now(),reason:reason||'automatisch',name:this._projName(),counts:c,daten}); while(list.length>this.BAK_MAX)list.pop(); this._writeBackups(list); this._lastBak=Date.now(); }catch(e){} },
  _maybeAutoBackup(){ const now=Date.now(); if(this._lastBak&&now-this._lastBak<this.BAK_MIN_MS)return; this._autoBackup('automatisch'); },
  restoreBackup(ts){ const b=this._listBackups().find(x=>x.ts===ts); if(!b)return; const c=b.counts||this._datenCounts(b.daten);
    if(!window.confirm('Automatische Sicherung vom '+this._fmtTs(b.ts)+' laden?\n'+c.floors+' Etage(n) \u00b7 '+c.el+' Elemente \u00b7 '+c.cab+' Leitungen\n\nDie aktuelle Planung wird ersetzt (\u201eZur\u00fcck\u201c macht es r\u00fcckg\u00e4ngig).'))return;
    this.pushUndo(); const d=JSON.parse(JSON.stringify(b.daten)); const cur={}; this.st.floors.forEach(f=>cur[f.id]=f);
    (d.floors||[]).forEach(f=>{ const o=cur[f.id]; if(o&&o.planURL)f.planURL=o.planURL; });
    this.st.selected=null;this.st.selEls=[];this.st.draft=null;this.st.mouse=null;this.st.calib=null;
    this.applyDaten(d); this.setPlanImg(); this.renderCalib(); this.renderFloors(); this.allRender(); if(!this.fl().view)this.fit(); this.persist();
    if(this.st.versionsOpen)this.renderVersions(); this.toast('Sicherung wiederhergestellt'); },
  clearBackups(){ if(!window.confirm('Alle automatischen Sicherungen l\u00f6schen?'))return; try{ localStorage.removeItem(this.BAKKEY); }catch(e){} if(this.st.versionsOpen)this.renderVersions(); },

  /* ============== Versionsstände ============== */
  _versionDaten(){ this.syncView(); const d={floors:this.st.floors.map(f=>{const o=Object.assign({},f);delete o.planURL;return o;}),activeFloor:this.st.activeFloor,circuits:this.st.circuits,activeCircuit:this.st.activeCircuit,activeCableType:this.st.activeCableType,prices:this.st.prices}; return JSON.parse(JSON.stringify(d)); },

  _fmtTs(ts){ try{ return new Date(ts).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } },
  freezeVersion(){ this.syncView(); const daten=this._versionDaten(); const name=this.uniqueName('Stand '+(this.st.versions.length+1),this.st.versions.map(v=>v.name)); const v={id:'v'+Date.now().toString(36)+Math.floor(Math.random()*999),name:name,ts:Date.now(),daten:daten}; this.st.versions.unshift(v); this.st.cmpA=v.id; this.st.cmpB='__cur'; this.persist(); this.renderVersions(); this.toast('Stand eingefroren: '+name); },
  validateVersionName(v){ const others=this.st.versions.filter(x=>x!==v).map(x=>x.name); const nm=this.uniqueName((v.name||'').trim()||'Stand',others); v.name=nm; },
  delVersion(id){ const v=this.st.versions.find(x=>x.id===id); if(!v)return; if(!window.confirm('Stand \u201e'+v.name+'\u201c l\u00f6schen?'))return; this.st.versions=this.st.versions.filter(x=>x.id!==id); if(this.st.cmpA===id)this.st.cmpA=this.st.versions.length?this.st.versions[0].id:'__cur'; if(this.st.cmpB===id)this.st.cmpB='__cur'; this.persist(); this.renderVersions(); },
  restoreVersion(id){ const v=this.st.versions.find(x=>x.id===id); if(!v)return; if(!window.confirm('Aktuelle Planung durch \u201e'+v.name+'\u201c ersetzen?\\nDer aktuelle Stand kann per \u201eZur\u00fcck\u201c wiederhergestellt werden.'))return;
    this.pushUndo(); const d=JSON.parse(JSON.stringify(v.daten)); const cur={}; this.st.floors.forEach(f=>cur[f.id]=f);

    d.versions=this.st.versions;

    this.applyDaten(d); this.setPlanImg(); this.renderFloors(); this.allRender(); if(!this.fl().view)this.fit();

    const byCat={}; checks.forEach(x=>{ if(x.sev==='tip')return; byCat[x.cat]=(byCat[x.cat]||0)+1; });
    const topCats=Object.keys(byCat).sort((a,b)=>byCat[b]-byCat[a]).slice(0,5);

    const elTypes=Object.keys(rep.elc).filter(t=>rep.elc[t]>0); const cabIds=Object.keys(rep.cm).filter(id=>rep.cm[id]>0.0001);
    let cost=0; elTypes.forEach(t=>cost+=rep.elc[t]*this.elPrice(t)); cabIds.forEach(id=>cost+=rep.cm[id]*this.cabPrice(id)); cost+=this.netExtraReport().sum;

    const riserWarn=checks.filter(x=>x.cat==='Steigleitung').length;
    const uvs=this.allUVs(); const pb=this.phaseBalance();
    // overlay + sheet
    const ov=h('div',{style:{position:'fixed',inset:'0',zIndex:'108',background:'rgba(28,32,36,.45)',overflow:'auto',padding:'26px 18px',fontFamily:'var(--sans)'}});
    ov.addEventListener('pointerdown',e=>{ if(e.target===ov)this.closeDashboard(); });

    // status banner
    const ok=nE===0; const bSev=ok?(nW?'tip':'ok'):'err';
    const bC={ok:{bg:'#eef7f0',bd:'#bfe3c8',c:'#16794a',ic:'✓'},tip:{bg:'#fcf6ec',bd:'#f0e2c4',c:'#b46b09',ic:'!'},err:{bg:'#fdf3f3',bd:'#f0c4c0',c:'#c0322a',ic:'✕'}}[bSev];
    body.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'14px',padding:'14px 16px',borderRadius:'12px',background:bC.bg,border:'1px solid '+bC.bd,marginBottom:'18px'}},
      h('span',{style:{width:'34px',height:'34px',borderRadius:'50%',background:bC.c,color:'#fff',fontSize:'17px',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}},bC.ic),
      h('div',{style:{flex:'1'}},
        h('div',{style:{fontSize:'14.5px',fontWeight:700,color:'#1c2024'}},ok?(nW?'Keine Fehler – '+nW+' Hinweis(e) prüfen':'Alles geprüft – keine Beanstandungen'):nE+' Fehler beheben'),

    // KPI grid
    const kpi=(num,label,sub,onClick)=>{ const card=h('div',{style:{flex:'1',minWidth:'118px',background:'#fbfbfc',border:'1px solid #edeff1',borderRadius:'11px',padding:'12px 13px',cursor:onClick?'pointer':'default'}},

    const floorRows=this.st.floors.map(f=>{

      const row=h('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'9px 11px',marginBottom:'5px',borderRadius:'9px',background:active?'#eef3fb':'#fbfbfc',border:'1px solid '+(active?'#d4e2f7':'#edeff1'),cursor:'pointer'}},

      row.addEventListener('click',()=>{ this.closeDashboard(); if(f.id!==this.st.activeFloor)this.switchFloor(f.id); requestAnimationFrame(()=>this.fit()); });
      return row; });
    cols.appendChild(sec('ETAGEN',floorRows));
    // -- Prüfung + Verteiler/Steig column

    else topCats.forEach(cat=>{ const gk=this._CHECK_GLOSS[cat];

      if(this.circIsKnx(c)){
        row.appendChild(h('span',{title:'KNX-Bus – grüne Busleitung (SELV), kein Automat',style:{fontSize:'10px',fontWeight:700,fontFamily:'var(--mono)',color:'#fff',background:KNX_GREEN,borderRadius:'4px',padding:'1px 5px',flex:'none'}},'KNX'));
      } else if(this.circIsData(c)){
        row.appendChild(h('span',{title:'Datenkreis (CAT7/SAT/Audio) – hängt an keiner Sicherung',style:{fontSize:'10px',fontWeight:700,fontFamily:'var(--mono)',color:'#2563eb',background:'#eef4fd',borderRadius:'4px',padding:'1px 5px',flex:'none'}},'DATEN'));
      } else {
        const _brk=this.circBreaker(c), _fi=this.circHasRcd(c); const _bShort=(_brk.phasen===3?'3~':'')+_brk.p+_brk.a;
        row.appendChild(h('span',{title:'Schutzorgan '+BREAKER_LABEL(c.breaker||this.suggestBreaker(c).breaker)+(_fi?' · FI/RCD 30 mA':''),style:{fontSize:'10px',fontWeight:700,fontFamily:'var(--mono)',color:'#6b7280',background:'#f1f3f5',borderRadius:'4px',padding:'1px 5px',flex:'none'}},_bShort+(_fi?' FI':'')));
        if(errCids.has(c.id))row.appendChild(h('span',{title:'Normfehler in diesem Stromkreis – siehe Tab „Prüfung“',style:{width:'7px',height:'7px',borderRadius:'50%',background:'#c0322a',flex:'none'}}));
      }
      row.appendChild(h('span',{title:'Als aktiven Stromkreis wählen',style:{fontSize:'11px',color:'#9aa1a8',fontFamily:'var(--mono)',cursor:'pointer'},onClick:()=>this.setActiveCircuit(c.id)},cnt));
      if(st.circuits.length>=1)row.appendChild(h('button',{className:'iconbtn',title:'Stromkreis löschen',style:{fontSize:'15px',width:'18px',height:'18px'},onClick:()=>this.delCircuit(c.id)},'×'));
      row.addEventListener('click',e=>{ if(e.target.closest('input,button'))return; this.setActiveCircuit(c.id); });
      row.addEventListener('contextmenu',e=>{ e.preventDefault(); this.showCtx(e.clientX,e.clientY,[
        {label:'Umbenennen',fn:()=>{name.focus();name.select();}},
        {label:'Farbe wählen…',fn:()=>this.openColorPicker(c.id,swatch)},
        {label:this.circIsKnx(c)?'◻ Als normalen Stromkreis':'◧ Als KNX-Bus markieren',fn:()=>this.setCircuitRole(c.id,this.circIsKnx(c)?'power':'knx')},
        {label:this.circIsData(c)?'◻ Als normalen Stromkreis':'⛁ Als Datenkreis (ohne Sicherung)',fn:()=>this.setCircuitRole(c.id,this.circIsData(c)?'power':'data')},
        {label:c.hidden?'Einblenden':'Ausblenden',fn:()=>this.toggleHide(c.id)},
        {label:'Als aktiv setzen',fn:()=>this.setActiveCircuit(c.id)},
        {label:'Duplizieren (ohne Elemente)',fn:()=>this.duplicateCircuit(c.id)},
        {label:'⇄ Kabeltyp aller Leitungen…',fn:()=>this.circCableTypeMenu(c.id,e.clientX,e.clientY)},
        {sep:true},
        {label:'↑ Nach oben',fn:()=>this.moveCircuit(c.id,-1)},
        {label:'↓ Nach unten',fn:()=>this.moveCircuit(c.id,1)},
      ].concat(st.circuits.length>=1?[{sep:true},{label:'Stromkreis löschen',danger:true,fn:()=>this.delCircuit(c.id)}]:[])); });
      dom.circuitList.appendChild(row);
    });
  },

  wire(){
    dom.area.addEventListener('pointerdown',e=>this.onDown(e));
    dom.area.addEventListener('pointermove',e=>this.onMove(e));
    dom.area.addEventListener('pointerleave',()=>{ if(this.st.mouse&&TYPES[this.st.tool]&&!this.st.draft&&!this.st.roomDraft){ this.st.mouse=null; this.scheduleScene(); } });
    dom.area.addEventListener('pointerup',e=>this.onUp(e));
    dom.area.addEventListener('dblclick',e=>this.onDbl(e));
    dom.area.addEventListener('contextmenu',e=>this.onContext(e));
    dom.area.addEventListener('wheel',e=>this.onWheel(e),{passive:false});
    window.addEventListener('keydown',e=>this.onKey(e));
    window.addEventListener('keyup',e=>{if(e.code==='Space'){this._space=false;this.updateCursor();}});
    $('#zIn').onclick=()=>this.zoomBy(1.25); $('#zOut').onclick=()=>this.zoomBy(0.8); $('#zFit').onclick=()=>this.fit();
    $('#tabProps').onclick=()=>{this.st.rightTab='props';this.renderRight();}; $('#tabList').onclick=()=>{this.st.rightTab='list';this.renderRight();}; $('#tabCheck').onclick=()=>{this.st.rightTab='check';this.renderRight();};
    $('#addCircuit').onclick=()=>this.newCircuitDialog();
    $('#btnUndo').onclick=()=>this.undo(); $('#btnRedo').onclick=()=>this.redo();
    $('#btnHelp').onclick=()=>this.openHelp('guide');
    { const bd=$('#btnDash'); if(bd)bd.onclick=()=>this.openDashboard(); }
    { const bp=$('#btnPalette'); if(bp){ bp.onclick=()=>this.openPalette(); const mk=this._modKey(); bp.innerHTML='⌕ Suchen <span style="font-family:var(--mono);font-size:11px;color:#9aa1a8;margin-left:1px">'+mk+'K</span>'; bp.title='Befehle & Schnellsuche – alles finden & hinspringen ('+mk+'+K)'; } }
    { const bm=$('#btnManual'); if(bm)bm.onclick=()=>window.open('handbuch.html','_blank'); }
    { const bd=$('#btnDark'); if(bd)bd.onclick=()=>this.toggleDark(); this._applyDark(); }
    $('#btnExport').onclick=e=>this.openMenu(e.currentTarget,[
      {label:'\ud83d\udcbe Projekt sichern (Datei)',fn:()=>this.exportProjekt()},
      {label:'\ud83d\udcc2 Projekt laden (Datei)\u2026',fn:()=>this.triggerImport()},
      {sep:true},
      {label:'\u2913 PNG-Bild',fn:()=>this.exportPng()},
      {label:'\u2913 CSV-Liste',fn:()=>this.exportCsv()},
      {label:'⎙ Planausdruck + Legende (PDF)',fn:()=>this.openPlanPrint()},
      {label:'\u2399 PDF / Drucken',fn:()=>window.print()},
    ]);
    $('#btnViews').onclick=e=>this.openMenu(e.currentTarget,[
      ...(this.atLeast(1)?[
      {head:'Pläne'},
      {label:'☷ Verteilerplan',fn:()=>this.openVerteiler()},
      {label:'▤ Verteiler-Beschriftung',fn:()=>this.openLabels()},
      {label:'⇕ Gebäudeschnitt',fn:()=>this.openSection()},
      ...(this.atLeast(2)?[
      {label:'⌁ Stromlaufplan (Einlinien)',fn:()=>this.openSchaltplan()},
      {label:'⊟ Klemmenplan',fn:()=>this.openKlemmen()},
      {label:'⑂ Anlagenbaum',fn:()=>this.openBaum()},
      ]:[]),
      ]:[]),
      {head:'Legende & Ausdruck'},
      {label:'◈ Symbol-Legende',fn:()=>this.openLegend()},
      {label:'⎙ Planausdruck + Legende',fn:()=>this.openPlanPrint()},
      {head:'Berichte'},
      {label:'▦ Raumbuch',fn:()=>this.openRaumbuch()},
      ...(this.atLeast(2)?[{label:'✔ Normbericht / Prüfprotokoll',fn:()=>this.openNormReport()}]:[]),
      {head:this.atLeast(2)?'KNX & Versionen':'Versionen'},
      ...(this.isKnx()?[{label:'⬡ KNX-Funktionsschema & Topologie',fn:()=>this.openKnxTopo()}]:[]),
      {label:'◷ Versionsstände',fn:()=>this.openVersions()},
    ]);
    this.setupResizers(); this.restorePanelWidths();
    $('#mobLeft').onclick=()=>this.toggleDrawer('left'); $('#mobRight').onclick=()=>this.toggleDrawer('right'); dom.scrim.onclick=()=>this.closeDrawers();
    $('#opacity').addEventListener('input',e=>{this.fl().planOpacity=parseFloat(e.target.value);dom.img.style.opacity=this.fl().planOpacity;this.persist();});
    $('#btnImport').onclick=()=>dom.file.click();
    $('#btnRemovePlan').onclick=()=>this.removePlan();
    dom.drop.onclick=()=>dom.file.click();
    dom.file.addEventListener('change',e=>{const f=e.target.files&&e.target.files[0];if(f)this.importPlan(f);dom.file.value='';});
    { const pi=$('#projImport'); if(pi)pi.addEventListener('change',e=>{const f=e.target.files&&e.target.files[0];if(f)this.importProjektFile(f);pi.value='';}); }
    ['dragenter','dragover'].forEach(ev=>dom.area.addEventListener(ev,e=>{e.preventDefault();dom.drop.classList.add('over');if(this.fl().planURL)dom.drop.style.display='flex';}));
    dom.area.addEventListener('dragleave',e=>{e.preventDefault();dom.drop.classList.remove('over');if(this.fl().planURL)dom.drop.style.display='none';});
    dom.area.addEventListener('drop',e=>{e.preventDefault();dom.drop.classList.remove('over');const f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];if(f)this.importPlan(f);else if(this.fl().planURL)dom.drop.style.display='none';});
  },
};
window.addEventListener('DOMContentLoaded',()=>App.init());
})();
</script>
</body>
</html>
