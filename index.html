<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elektroplanung – Grundriss</title>
<style>
  :root{
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
    --line:#d7dbdf; --line2:#e4e7ea; --ink:#1c2024; --ink2:#374151; --mut:#9aa1a8; --mut2:#6b7280;
    --hi:#eef1f4; --accent:#2563eb;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--sans);color:var(--ink);background:#e9ebee;overflow:hidden;-webkit-font-smoothing:antialiased}
  input,select,textarea,button{font-family:inherit}
  input:focus,select:focus,textarea:focus{border-color:#9aa3ad}
  button{font-family:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#c7cdd3;border-radius:6px;border:2px solid #fff}
  .app{display:flex;flex-direction:column;height:100vh;user-select:none}
  .topbar{height:54px;flex:none;display:flex;align-items:center;gap:16px;padding:0 16px;background:#fff;border-bottom:1px solid var(--line);z-index:5}
  .tbtn{display:flex;align-items:center;gap:6px;height:34px;padding:0 12px;border:1px solid var(--line);background:#fff;border-radius:7px;font-size:13px;font-weight:500;color:var(--ink2);cursor:pointer;white-space:nowrap}
  .tbtn:hover{background:#f6f7f8}
  .tbtn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .meta{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12px;color:#5b636b}
  .body{flex:1;display:flex;min-height:0}
  .left{width:222px;flex:none;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;overflow-y:auto}
  .right{width:344px;flex:none;background:#fff;border-left:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
  .sechead{font-size:10px;font-weight:700;letter-spacing:.09em;color:var(--mut);padding:0 6px 8px}
  .toolrow{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:#3a4250}
  .toolrow:hover{background:#f6f7f8}
  .toolrow.active{background:var(--hi);font-weight:600}
  .toolrow .ic{display:flex;width:24px;height:22px;align-items:center;justify-content:center;flex:none}
  .toolrow .key{font-family:var(--mono);font-size:11px;color:#b4bac0}
  .field-label{display:block;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
  .inp{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:13.5px;outline:none;background:#fff}
  .sel{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:13px;background:#fff;outline:none;color:var(--ink2)}
  .canvas{flex:1;position:relative;min-width:0;background:#f4f5f6;overflow:hidden;touch-action:none}
  .scene{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
  .scene img{position:absolute;left:0;top:0;user-select:none;pointer-events:none}
  .scene svg{position:absolute;left:0;top:0;overflow:visible;pointer-events:none}
  .zoombar{position:absolute;left:14px;bottom:14px;display:flex;gap:6px;background:#fff;padding:6px;border-radius:9px;border:1px solid var(--line);box-shadow:0 2px 8px rgba(20,25,30,.07)}
  .zoombar button{height:30px;border:0;background:#f1f3f5;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--ink2);padding:0 12px}
  .zoombar button.sq{width:30px;padding:0;font-size:17px}
  .floorbar{position:absolute;top:14px;left:14px;display:flex;align-items:center;gap:4px;background:#fff;padding:5px 7px;border-radius:9px;border:1px solid var(--line);box-shadow:0 2px 8px rgba(20,25,30,.07);max-width:calc(100% - 28px);overflow-x:auto}
  .floorbar .lbl{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--mut);padding:0 4px;flex:none}
  .floorbar .ftab{height:30px;padding:0 12px;border:0;background:transparent;border-radius:6px;font-size:12.5px;font-weight:500;color:var(--ink2);cursor:pointer;white-space:nowrap;flex:none}
  .floorbar .ftab:hover{background:#f1f3f5}
  .floorbar .fgrp{display:flex;align-items:center;background:#eef1f4;border-radius:6px;flex:none}
  .floorbar .fname{height:30px;border:0;background:transparent;font-size:12.5px;font-weight:600;color:var(--ink);padding:0 6px 0 10px;outline:none;min-width:64px;max-width:150px;width:90px}
  .floorbar .addf{height:30px;width:30px;padding:0;font-size:17px;font-weight:700;border:0;background:#f1f3f5;border-radius:6px;cursor:pointer;color:var(--ink2);flex:none}
  .hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(28,32,36,.92);color:#fff;padding:8px 15px;border-radius:8px;font-size:12.5px;font-weight:500;box-shadow:0 3px 12px rgba(0,0,0,.18);white-space:nowrap;pointer-events:none;z-index:3}
  .dropzone{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--mut);text-align:center;padding:40px}
  .dropzone .box{border:2.5px dashed #c2c8ce;border-radius:18px;padding:46px 60px;background:rgba(255,255,255,.5);max-width:520px;transition:.12s}
  .dropzone.over .box{border-color:var(--accent);background:rgba(37,99,235,.06)}
  .tabbtn{padding:8px 14px;border:0;border-radius:7px 7px 0 0;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--mut);border-bottom:2px solid transparent}
  .tabbtn.active{color:var(--ink);font-weight:600;border-bottom-color:var(--accent)}
  .scrollbody{flex:1;overflow-y:auto;min-height:0}
  .stat{flex:1;background:#f6f7f8;border-radius:9px;padding:11px 12px}
  .stat .k{font-size:10.5px;color:var(--mut);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
  .stat .v{font-size:21px;font-weight:600;font-family:var(--mono)}
  .row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#f9fafb;border-radius:8px}
  .listrow{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:7px;cursor:pointer}
  .listrow:hover{background:#f6f7f8}
  .modal-bg{position:fixed;inset:0;background:rgba(28,32,36,.28);display:flex;align-items:center;justify-content:center;z-index:40}
  .modal{background:#fff;border-radius:12px;padding:22px;width:320px;box-shadow:0 12px 40px rgba(0,0,0,.25)}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 16px;border-radius:9px;font-size:13px;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.25);opacity:0;transition:.2s;pointer-events:none}
  .toast.show{opacity:1}
  .dot{width:11px;height:11px;border-radius:3px;flex:none}
  .iconbtn{width:22px;height:22px;border:0;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:5px;flex:none;color:#9aa1a8}
  .iconbtn:hover{background:#eef0f2;color:var(--ink2)}
  @media print{
    .topbar,.left,.right,.zoombar,.floorbar,.hint,.dropzone,.scrim,.mobtoggle{display:none!important}
    .app,.body,.canvas{position:static;height:auto;overflow:visible}
    .canvas{background:#fff}
    body.printVerteiler .app{display:none!important}
    body.printVerteiler #verteilerOverlay{position:static!important;display:block!important;background:#fff;overflow:visible}
    body.printVerteiler #verteilerOverlay .v-sheet{box-shadow:none!important;margin:0!important;max-width:none!important}
    body.printVerteiler .v-noprint{display:none!important}
    body.printVerteiler .v-printonly{display:block!important}
  }
  .mobtoggle{display:none}
  .scrim{position:fixed;inset:0;background:rgba(20,25,30,.4);z-index:14;display:none}
  .scrim.show{display:block}
  @media (max-width:900px){
    .topbar{height:auto;min-height:50px;flex-wrap:wrap;padding:7px 10px;gap:8px}
    .topbar .hide-sm{display:none!important}
    .mobtoggle{display:flex!important;align-items:center;justify-content:center;width:40px;height:34px;padding:0;font-size:18px}
    .left,.right{position:fixed;top:0;bottom:0;z-index:15;box-shadow:0 0 50px rgba(0,0,0,.22);transition:transform .24s ease}
    .left{left:0;width:min(86vw,300px);transform:translateX(-103%)}
    .right{right:0;width:min(92vw,366px);transform:translateX(103%)}
    .left.open,.right.open{transform:translateX(0)}
  }
  @media (min-width:901px){ .left,.right{transform:none!important} .scrim{display:none!important} }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <button class="tbtn mobtoggle" id="mobLeft" title="Werkzeuge">☰</button>
    <div style="display:flex;align-items:baseline;gap:9px">
      <span style="font-weight:700;font-size:15px">Elektroplanung</span>
    </div>
    <div class="hide-sm" style="width:1px;height:24px;background:var(--line2)"></div>
    <div id="projektBar" style="display:flex;align-items:center;gap:7px"></div>
    <div class="hide-sm" style="width:1px;height:24px;background:var(--line2)"></div>
    <div class="meta hide-sm"><span style="color:var(--mut)">Maßstab</span><span id="lblScale" style="color:var(--ink);font-weight:500">—</span></div>
    <div class="meta hide-sm"><span style="color:var(--mut)">Zoom</span><span id="lblZoom" style="color:var(--ink);font-weight:500">—</span></div>
    <div style="flex:1"></div>
    <div class="hide-sm" style="display:flex;align-items:center;gap:9px;margin-right:2px">
      <span style="font-size:12px;color:var(--mut)">Plan</span>
      <input id="opacity" type="range" min="0.15" max="1" step="0.05" value="1" style="width:80px;accent-color:#6b7280">
    </div>
    <span id="saveStatus" style="font-size:12px;color:var(--mut);min-width:96px;text-align:right;white-space:nowrap"></span>
    <button class="tbtn" id="btnImport" title="Grundriss für die aktive Etage importieren">⤒ Plan importieren</button>
    <button class="tbtn" id="btnUndo" title="Rückgängig (Strg+Z)">↺ Zurück</button>
    <button class="tbtn" id="btnRedo" title="Wiederherstellen (Strg+Umschalt+Z / Strg+Y)">↻ Vor</button>
    <button class="tbtn" id="btnPng">⤓ PNG</button>
    <button class="tbtn" id="btnCsv">⤓ CSV</button>
    <button class="tbtn" id="btnVerteiler" title="Verteiler-/Stromlaufplan">☷ Verteiler</button>
    <button class="tbtn" id="btnPrint">⎙ PDF</button>
    <button class="tbtn mobtoggle" id="mobRight" title="Eigenschaften & Stromkreise">▤</button>
  </header>

  <div class="body">
    <aside class="left" id="leftPanel"></aside>

    <main class="canvas" id="canvasArea">
      <div class="scene" id="scene">
        <img id="planImg" alt="" draggable="false" style="display:none">
        <svg id="overlay"></svg>
      </div>
      <div class="dropzone" id="dropzone">
        <div class="box">
          <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#aab0b6" stroke-width="1.5" style="margin-bottom:14px">
            <path d="M3 16.5V18a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-1.5"/><path d="M12 3v12"/><path d="M8 7l4-4 4 4"/>
          </svg>
          <div style="font-size:15px;font-weight:600;color:var(--ink2)">Grundriss importieren</div>
          <div id="dropHint" style="font-size:13px;line-height:1.55;margin-top:8px">Bild hierher ziehen oder <b style="color:var(--accent)">zum Auswählen klicken</b><br>PNG · JPG · SVG · WEBP</div>
        </div>
      </div>
      <div class="floorbar" id="floorBar"></div>
      <div class="zoombar">
        <button class="sq" id="zOut">−</button>
        <button id="zFit">Einpassen</button>
        <button class="sq" id="zIn">+</button>
      </div>
      <div class="hint" id="hint" style="display:none"></div>
    </main>

    <aside class="right">
      <div style="display:flex;padding:10px 12px 0;gap:4px;flex:none">
        <button class="tabbtn active" id="tabProps">Eigenschaften</button>
        <button class="tabbtn" id="tabList">Stückliste</button>
        <button class="tabbtn" id="tabCheck">Prüfung<span id="checkBadge" style="display:none;margin-left:6px;font-size:10.5px;font-weight:700;font-family:var(--mono);color:#fff;background:#c0322a;border-radius:9px;padding:1px 6px;vertical-align:1px"></span></button>
      </div>
      <div style="height:1px;background:var(--line2);flex:none"></div>
      <div class="scrollbody" id="rightBody"></div>
      <div style="border-top:1px solid var(--line2);padding:12px 16px 14px;flex:none;background:#fbfcfc">
        <div style="display:flex;align-items:center;margin-bottom:9px">
          <span style="font-size:10.5px;font-weight:700;letter-spacing:.06em;color:var(--mut);flex:1">STROMKREISE</span>
          <button class="tbtn" id="addCircuit" style="height:26px;padding:0 10px;font-size:12px">+ Neu</button>
        </div>
        <div id="circuitList" style="display:flex;flex-direction:column;gap:4px;max-height:172px;overflow-y:auto"></div>
      </div>
    </aside>
  </div>
</div>
<input type="file" id="fileInput" accept="image/*" hidden>
<div class="scrim" id="scrim"></div>
<div id="calibHost"></div>
<div id="verteilerHost"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";
const $=s=>document.querySelector(s);
const SVGNS='http://www.w3.org/2000/svg';
const SVG_TAGS=new Set(['svg','g','path','line','circle','rect','text','polyline','polygon','ellipse','tspan','defs','use']);
const ATTR={strokeWidth:'stroke-width',strokeLinejoin:'stroke-linejoin',strokeLinecap:'stroke-linecap',strokeDasharray:'stroke-dasharray',textAnchor:'text-anchor',dominantBaseline:'dominant-baseline',fontSize:'font-size',fontWeight:'font-weight',fontFamily:'font-family',fillOpacity:'fill-opacity',strokeOpacity:'stroke-opacity'};
function h(tag,props){
  const kids=[].slice.call(arguments,2);
  const el=SVG_TAGS.has(tag)?document.createElementNS(SVGNS,tag):document.createElement(tag);
  if(props) for(const k in props){
    const v=props[k]; if(v==null||v===false) continue;
    if(k==='style'&&typeof v==='object'){ for(const s in v) el.style[s]=v[s]; }
    else if(k==='className') el.setAttribute('class',v);
    else if(k.slice(0,2)==='on'&&typeof v==='function') el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(typeof v==='function') continue;
    else el.setAttribute(ATTR[k]||k,v);
  }
  flatAppend(el,kids); return el;
}
function flatAppend(el,kids){ for(const c of kids){ if(c==null||c===false) continue; if(Array.isArray(c)) flatAppend(el,c); else el.appendChild(c.nodeType?c:document.createTextNode(String(c))); } }
function clear(el){ while(el.firstChild) el.removeChild(el.firstChild); }

/* ============== Daten ============== */
const PALETTE=['#2563eb','#dc2626','#16a34a','#d97706','#7c3aed','#0891b2','#db2777','#65a30d','#0d9488','#9333ea'];
const TYPES={
  lichtquelle:{name:'Lichtquelle (Decke)',prefix:'L'}, lichtquelle_dim:{name:'Lichtquelle dimmbar',prefix:'LD'}, lichtquelle_wand:{name:'Lichtquelle Wand',prefix:'WL'},
  schalter:{name:'Lichtschalter',prefix:'S'}, taster:{name:'Taster',prefix:'T'}, taster4:{name:'Taster 4-fach',prefix:'T4'},
  steckdose:{name:'Steckdose',prefix:'SD'}, steckdose2:{name:'Steckdose 2-fach',prefix:'SD2'}, steckdose5:{name:'Steckdose 5-fach',prefix:'SD5'}, steckdose_schalt:{name:'Steckdose schaltbar',prefix:'SDS'}, steckdose_stark:{name:'Starkstrom 400V',prefix:'ST'},
  bewegungsmelder:{name:'Bewegungsmelder',prefix:'BM'}, praesenzmelder:{name:'Präsenzmelder',prefix:'PM'}, rauchmelder:{name:'Rauchmelder',prefix:'RM'}, hitzemelder:{name:'Hitzemelder',prefix:'HM'}, temperatur:{name:'Temperaturfühler',prefix:'TF'},
  fensterkontakt:{name:'Fensterkontakt',prefix:'FK'}, tuerkontakt:{name:'Türkontakt',prefix:'TK'}, erollladen:{name:'E-Rollladen',prefix:'RL'}, markise:{name:'Markise',prefix:'MK'},
  audio:{name:'Audio / Lautsprecher',prefix:'AU'}, audiobuchse:{name:'Audiobuchse',prefix:'AB'}, hdmi:{name:'HDMI',prefix:'HD'}, tv:{name:'TV-Anschluss',prefix:'TV'},
  lan:{name:'LAN (Netzwerk)',prefix:'LAN'}, lan2:{name:'LAN 2-fach',prefix:'LAN2'}, wlan:{name:'WLAN-Hotspot',prefix:'AP'}, wetterstation:{name:'Wetterstation',prefix:'WS'},
  heizkreisverteiler:{name:'Heizkreisverteiler',prefix:'HKV'}, gong:{name:'Gong',prefix:'GO'}, junction:{name:'Verteiler / Abzweigdose',prefix:'V'},
  tablet:{name:'Tablet / Bedienpanel',prefix:'TAB'}, tuerklingel:{name:'Türklingel',prefix:'KL'}, kamera:{name:'Überwachungskamera',prefix:'CAM'},
  herd:{name:'Herd',prefix:'HRD'}, ofen:{name:'Backofen',prefix:'OFN'}, waschmaschine:{name:'Waschmaschine',prefix:'WM'}, trockner:{name:'Trockner',prefix:'TRK'}, kuehlschrank:{name:'Kühlschrank',prefix:'KS'},
  ceiling:{name:'Lichtquelle (Decke)',prefix:'L'}, wall:{name:'Lichtquelle Wand',prefix:'WL'}, socket:{name:'Steckdose',prefix:'SD'}, sensor:{name:'Bewegungsmelder',prefix:'BM'},
};
const CATS=[
  {name:'Beleuchtung',keys:['lichtquelle','lichtquelle_dim','lichtquelle_wand']},
  {name:'Schalter & Taster',keys:['schalter','taster','taster4']},
  {name:'Steckdosen',keys:['steckdose','steckdose2','steckdose5','steckdose_schalt','steckdose_stark']},
  {name:'Melder & Fühler',keys:['bewegungsmelder','praesenzmelder','rauchmelder','hitzemelder','temperatur']},
  {name:'Kontakte & Antrieb',keys:['fensterkontakt','tuerkontakt','erollladen','markise']},
  {name:'Multimedia',keys:['audio','audiobuchse','hdmi','tv']},
  {name:'Netzwerk',keys:['lan','lan2','wlan','wetterstation']},
  {name:'Verteilung',keys:['heizkreisverteiler','gong','junction']},
  {name:'Tür & Sicherheit',keys:['tuerklingel','kamera','tablet']},
  {name:'Geräte / Großverbraucher',keys:['herd','ofen','kuehlschrank','waschmaschine','trockner']},
];
const CABLE_TYPES=[
  {id:'knx',name:'KNX Bus',short:'KNX',dash:'2 7'},
  {id:'audio',name:'Steuerkabel Audio',short:'Audio',dash:'10 6'},
  {id:'nym15',name:'NYM-J 3×1,5 mm²',short:'3×1,5',dash:'none'},
  {id:'nym25',name:'NYM-J 3×2,5 mm²',short:'3×2,5',dash:'none'},
  {id:'nym5x15',name:'NYM-J 5×1,5 mm²',short:'5×1,5',dash:'none'},
  {id:'nym5x25',name:'NYM-J 5×2,5 mm²',short:'5×2,5',dash:'none'},
  {id:'stark',name:'Starkstrom 5×6 mm²',short:'5×6',dash:'none'},
  {id:'cat7',name:'CAT7 (einfach)',short:'CAT7',dash:'14 5 2 5'},
  {id:'cat7x2',name:'CAT7 (doppelt)',short:'CAT7×2',dash:'14 5 2 5'},
  {id:'sat',name:'SAT-Koaxialkabel',short:'SAT',dash:'3 4'},
];
const CABLE_BY_ID=Object.fromEntries(CABLE_TYPES.map(c=>[c.id,c]));
const WALL_TYPES=new Set(['schalter','taster','taster4','steckdose','steckdose2','steckdose5','steckdose_schalt','steckdose_stark','lichtquelle_wand','tablet','tuerklingel','kamera','heizkreisverteiler','herd','ofen','waschmaschine','trockner','kuehlschrank','audiobuchse','hdmi','tv','lan','lan2']);
const DEFAULT_HEIGHT={schalter:'105',taster:'105',taster4:'105',steckdose:'30',steckdose2:'30',steckdose5:'30',steckdose_schalt:'30',steckdose_stark:'30',lichtquelle_wand:'200',tablet:'150',tuerklingel:'140',kamera:'230',herd:'30',ofen:'150',waschmaschine:'110',trockner:'110',kuehlschrank:'30',tv:'120',hdmi:'120',audiobuchse:'30',lan:'30',lan2:'30',heizkreisverteiler:'60'};
/* Raumtypen (DIN 18015-2 Mindestausstattung / DIN 14676 Rauchmelder).
   feucht  -> RCD 30 mA Pflicht (DIN VDE 0100-410/-701)
   schlaf  -> Rauchmelderpflicht (Schlafen/Kinder)
   rettung -> Rauchmelderpflicht (Flure als Rettungsweg)
   minSteckdosen / minLicht -> Mindestausstattung nach DIN 18015-2 (Richtwerte) */
const ROOM_TYPES={
  wohnen:{name:'Wohnen',color:'#2563eb',minSteckdosen:5,minLicht:1},
  essen:{name:'Essen',color:'#0891b2',minSteckdosen:3,minLicht:1},
  schlafen:{name:'Schlafen',color:'#7c3aed',minSteckdosen:3,minLicht:1,schlaf:true},
  kind:{name:'Kinderzimmer',color:'#db2777',minSteckdosen:3,minLicht:1,schlaf:true},
  kueche:{name:'Küche',color:'#d97706',minSteckdosen:5,minLicht:1,feucht:true},
  bad:{name:'Bad / WC',color:'#0d9488',minSteckdosen:2,minLicht:1,feucht:true,rettung:false},
  flur:{name:'Flur / Diele',color:'#65a30d',minSteckdosen:1,minLicht:1,rettung:true},
  buero:{name:'Arbeiten / Büro',color:'#9333ea',minSteckdosen:4,minLicht:1},
  hwr:{name:'HWR / Technik',color:'#6b7280',minSteckdosen:2,minLicht:1,feucht:true},
  keller:{name:'Keller / Abstellen',color:'#92766a',minSteckdosen:1,minLicht:1},
  aussen:{name:'Außen / Terrasse',color:'#16a34a',minSteckdosen:1,minLicht:1,feucht:true},
  sonstiges:{name:'Sonstiges',color:'#64748b',minSteckdosen:0,minLicht:0},
};

/* ============== Backend-Anbindung (Stufe 4) ==============
   Same-origin: das Backend liefert dieses Frontend selbst aus, daher /api/...
   Kein Backend erreichbar -> Offline-Modus mit localStorage (unverändert). */
const PKEY='elplan_projekt', TKEY='elplan_token';
const Api={
  token:null,
  loadToken(){ try{ this.token=localStorage.getItem(TKEY)||null; }catch(e){ this.token=null; } return this.token; },
  setToken(t){ this.token=t||null; try{ if(t)localStorage.setItem(TKEY,t); else localStorage.removeItem(TKEY); }catch(e){} },
  async _json(method,path,body){
    const opt={method,headers:{}};
    if(this.token)opt.headers['Authorization']='Bearer '+this.token;
    if(body!==undefined){ opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
    const r=await fetch('/api'+path,opt);
    if(r.status===401){ const e=new Error('unauthorized'); e.status=401; throw e; }
    if(!r.ok){ let msg='HTTP '+r.status; try{ const j=await r.json(); if(j&&j.detail)msg=j.detail; }catch(_){} const e=new Error(msg); e.status=r.status; throw e; }
    return r.status===204?null:r.json();
  },
  async health(){
    for(let attempt=0;attempt<3;attempt++){
      const c=new AbortController(); const t=setTimeout(()=>c.abort(),8000);
      try{ const r=await fetch('/api/health',{signal:c.signal,cache:'no-store'}); clearTimeout(t);
        if(r.ok){ const j=await r.json(); if(j&&j.status==='ok')return true; }
      }catch(e){ clearTimeout(t); }
      await new Promise(res=>setTimeout(res,700));
    }
    return false;
  },
  register(email,password,name){ return this._json('POST','/auth/register',{email,password,name}); },
  login(email,password){ return this._json('POST','/auth/login',{email,password}); },
  me(){ return this._json('GET','/auth/me'); },
  listProjekte(){ return this._json('GET','/projekte'); },
  getProjekt(id){ return this._json('GET','/projekte/'+id); },
  createProjekt(name,daten){ return this._json('POST','/projekte',{name,daten:daten||{}}); },
  updateProjekt(id,patch){ return this._json('PUT','/projekte/'+id,patch); },
  deleteProjekt(id){ return this._json('DELETE','/projekte/'+id); },
  fileUrl(id){ return '/api/dateien/'+id+'/inhalt'+(this.token?('?token='+encodeURIComponent(this.token)):''); },
  async uploadDatei(projektId,file,etage){ const fd=new FormData(); fd.append('datei',file); fd.append('etage',etage||''); const headers={}; if(this.token)headers['Authorization']='Bearer '+this.token; const r=await fetch('/api/projekte/'+projektId+'/dateien',{method:'POST',body:fd,headers}); if(r.status===401){const e=new Error('unauthorized');e.status=401;throw e;} if(!r.ok)throw new Error('HTTP '+r.status); return r.json(); },
  deleteDatei(id){ return this._json('DELETE','/dateien/'+id); },
};

  async doAuth(mode,email,password,name,errEl,btn){

  onElDown(id,e){

  onCableDown(id,e){ e.stopPropagation(); if(this.st.tool!=='select'){this.toolClick(this.planPoint(e));return;} this.st.selected={kind:'cable',id}; this.st.rightTab='props'; this.renderScene(); this.renderRight(); if(this.isMobile())this.openDrawer('right'); },
  onVertDown(id,i,e){ e.stopPropagation(); if(this.st.tool!=='select')return; this.pushUndo(); this._vdrag={id,i}; try{dom.area.setPointerCapture(e.pointerId);}catch(_){} },
  moveConnected(elId,x,y){ for(const c of this.fl().cables){ if(c.fromEl===elId)c.points[0]={x,y}; if(c.toEl===elId)c.points[c.points.length-1]={x,y}; } },
  onMove(e){

  onDbl(){ if(this.st.tool==='cable'&&this.st.draft)this.finishCable(null); else if(this.st.tool==='room'&&this.st.roomDraft)this.finishRoom(); },

  onKey(e){

  /* ---- circuits ---- */
  addCircuit(){ this.pushUndo(); const used=this.st.circuits.map(c=>c.color); const color=PALETTE.find(p=>!used.includes(p))||PALETTE[this.st.circuits.length%PALETTE.length]; const id='c'+Date.now().toString(36); const name=this.uniqueName('Stromkreis '+(this.st.circuits.length+1),this.st.circuits.map(c=>c.name)); this.st.circuits.push({id,name,color,hidden:false}); this.st.activeCircuit=id; this.renderCircuits(); this.renderLeft(); this.persist(); },

  setActiveCircuit(id){ if(this.st.activeCircuit===id)return; this.st.activeCircuit=id; this.renderCircuits(); this.renderLeft(); },
  showCtx(x,y,items){ this.hideCtx();
    const menu=h('div',{style:{position:'fixed',left:x+'px',top:y+'px',zIndex:'10000',background:'#fff',border:'1px solid #e3e6e9',borderRadius:'9px',boxShadow:'0 10px 30px rgba(20,25,30,.18)',padding:'5px',minWidth:'168px',fontFamily:'var(--sans)'}});

  /* ---- plan import ---- */
  importPlan(file){

    const rd=new FileReader();
    rd.onload=()=>{ const url=rd.result; const im=new Image(); im.onload=async()=>{
      const f=this.fl(); f.planW=im.naturalWidth||2000; f.planH=im.naturalHeight||1414; f.view=null;
      if(this.st.online&&this.st.projektId){
        this.setStatus('Lädt Plan hoch…');
        try{ const old=f.planFileId; const res=await Api.uploadDatei(this.st.projektId,file,f.name); f.planFileId=res.id; f.planURL=Api.fileUrl(res.id); if(old)Api.deleteDatei(old).catch(()=>{}); this.setStatus('Gespeichert'); }
        catch(e){ f.planFileId=null; f.planURL=url; this.toast('Upload fehlgeschlagen – Plan nur in dieser Sitzung'); }
      } else { f.planFileId=null; f.planURL=url; }
      this.setPlanImg(); this.renderScene(); this.fit(); this.persist(); this.toast('Grundriss importiert: '+f.name);
    }; im.onerror=()=>this.toast('Bild konnte nicht geladen werden'); im.src=url; };
    rd.readAsDataURL(file);
  },

  /* ---- export ---- */
  exportCsv(){
    const f=this.fl(), st=this.st, cn=id=>{const c=this.circ(id);return c?c.name:'';}, elLbl=id=>{const e=f.elements.find(e=>e.id===id);return e?e.label:'';};
    const esc=v=>{v=(v==null?'':String(v));return /[";\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
    const rows=[]; rows.push(['ETAGE',f.name]); rows.push([]);
    rows.push(['ELEMENTE']); rows.push(['Bezeichnung','Typ','Ausführung','Modell','Leistung (W)','Stromkreis','Raum','Dimmgruppe','Höhe (cm)','Schaltung','Schutzart','Status','Notiz','X','Y']);
    const ausf=e=>{const g=gangOf(e);if(g)return g+'-fach';const t=tastenOf(e);if(t)return t+'-fach';return '';};
    const rn=e=>{const r=f.rooms.length?this._roomOfOn(f,e):null;return r?(r.name||(ROOM_TYPES[r.type]||{}).name):'';};
    f.elements.forEach(e=>rows.push([e.label,(TYPES[e.type]||{name:e.type}).name,ausf(e),e.model,e.watt,cn(e.circuit),rn(e),e.dim,e.height,e.schaltung,e.ip,e.status||'Geplant',e.note,e.x,e.y]));
    rows.push([]); rows.push(['KABEL']); rows.push(['Stromkreis','Kabeltyp','Länge (m)','Von','Nach','Knickpunkte']);
    f.cables.forEach(k=>{const ct=CABLE_BY_ID[k.cableType];const m=f.scalePxPerM?(this.cableLenPx(k.points)/f.scalePxPerM).toFixed(2).replace('.',','):'';rows.push([cn(k.circuit),ct?ct.name:'',m,elLbl(k.fromEl),elLbl(k.toEl),k.points.length]);});
    rows.push([]); rows.push(['ZUSAMMENFASSUNG JE KABELTYP']); rows.push(['Kabeltyp','Anzahl','Gesamtlänge (m)']);
    CABLE_TYPES.forEach(ct=>{const list=f.cables.filter(k=>k.cableType===ct.id);if(!list.length)return;const px=list.reduce((s,k)=>s+this.cableLenPx(k.points),0);rows.push([ct.name,list.length,f.scalePxPerM?(px/f.scalePxPerM).toFixed(2).replace('.',','):'']);});

    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='Elektroplanung_'+f.name.replace(/\s+/g,'_')+'.csv'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  },
  exportPng(){
    const f=this.fl(); this.st.selected=null; this.st.draft=null; this.st.calib=null; this.renderScene();
    setTimeout(()=>{
      try{
        const W=f.planW,H=f.planH;
        const clone=dom.overlay.cloneNode(true); clone.setAttribute('width',W); clone.setAttribute('height',H); clone.setAttribute('viewBox','0 0 '+W+' '+H);
        const xml=new XMLSerializer().serializeToString(clone); const url=URL.createObjectURL(new Blob([xml],{type:'image/svg+xml;charset=utf-8'}));
        const cv=document.createElement('canvas'); cv.width=W; cv.height=H; const cx=cv.getContext('2d'); cx.fillStyle='#fff'; cx.fillRect(0,0,W,H);
        const drawOverlay=()=>{ const ov=new Image(); ov.onload=()=>{ cx.drawImage(ov,0,0,W,H); URL.revokeObjectURL(url); cv.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='Elektroplanung_'+f.name.replace(/\s+/g,'_')+'.png';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}); }; ov.onerror=()=>{URL.revokeObjectURL(url);this.toast('Export fehlgeschlagen');}; ov.src=url; };

      wrap.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'16px'}},
        h('span',{style:{width:'34px',height:'34px',borderRadius:'8px',background:'#f1f3f5',display:'flex',alignItems:'center',justifyContent:'center',flex:'none',fontSize:'18px'}},'⌇'),
        h('div',null,h('div',{style:{fontSize:'14px',fontWeight:600}},'Kabelweg'),h('div',{style:{fontSize:'11.5px',color:'#9aa1a8',fontFamily:'var(--mono)'}},cab.points.length+' Punkte'))));
      wrap.appendChild(h('div',{style:{background:'#f6f7f8',borderRadius:'9px',padding:'13px 14px',marginBottom:'14px'}},
        h('div',{style:{fontSize:'11px',color:'#9aa1a8',fontWeight:600,letterSpacing:'.04em',textTransform:'uppercase'}},'Länge'),
        h('div',{style:{fontSize:'24px',fontWeight:600,fontFamily:'var(--mono)',marginTop:'2px'}},this.fmtLen(this.cableLenPx(cab.points))||'— (Maßstab setzen)')));
      wrap.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'14px',fontSize:'12.5px',color:'#374151'}},
        h('span',{style:{flex:'1'}},'Verbindung'),h('span',{style:{fontFamily:'var(--mono)',fontWeight:600}},elLbl(cab.fromEl)+'  →  '+elLbl(cab.toEl))));
      const tsel=h('select',{className:'sel'});CABLE_TYPES.forEach(c=>tsel.appendChild(h('option',{value:c.id},c.name)));tsel.value=cab.cableType;tsel.addEventListener('change',e=>this.editCab('cableType',e.target.value));

  },
  renderList(){

    wrap.appendChild(h('div',{style:{display:'flex',gap:'8px',marginBottom:'16px'}},
      h('div',{className:'stat'},h('div',{className:'k'},'Elemente'),h('div',{className:'v'},f.elements.length)),
      h('div',{className:'stat'},h('div',{className:'k'},'Last gesamt'),h('div',{className:'v'},totalWatt?totalWatt+' W':'0 W'))));

      const watt=f.elements.filter(e=>e.circuit===c.id).reduce((s,e)=>s+(parseFloat(e.watt)||0),0);
      const lenpx=f.cables.filter(k=>k.circuit===c.id).reduce((s,k)=>s+this.cableLenPx(k.points),0);
      const conns=f.cables.filter(k=>k.circuit===c.id&&k.fromEl&&k.toEl).length;
      cg.appendChild(h('div',{className:'row',style:{opacity:c.hidden?0.45:1}},h('span',{className:'dot',style:{background:c.color}}),
        h('span',{style:{flex:'1',fontSize:'13px',fontWeight:500}},c.name),
        h('span',{style:{fontSize:'11px',color:'#9aa1a8',fontFamily:'var(--mono)'}},conns+' Verb.'),
        h('span',{style:{fontSize:'12px',color:'#6b7280',fontFamily:'var(--mono)'}},watt?watt+' W':'—'),
        h('span',{style:{fontSize:'12px',color:'#9aa1a8',fontFamily:'var(--mono)',minWidth:'54px',textAlign:'right'}},f.scalePxPerM?(lenpx/f.scalePxPerM).toFixed(1)+' m':'—')));
    });
    wrap.appendChild(cg);
    const totalLenPx=f.cables.reduce((s,k)=>s+this.cableLenPx(k.points),0);
    wrap.appendChild(h('div',{style:{display:'flex',alignItems:'center',marginBottom:'8px'}},h('span',{style:{fontSize:'10.5px',fontWeight:700,letterSpacing:'.06em',color:'#9aa1a8',flex:'1'}},'KABEL JE TYP'),h('span',{style:{fontSize:'11.5px',color:'#6b7280',fontFamily:'var(--mono)'}},'Σ '+(f.scalePxPerM?(totalLenPx/f.scalePxPerM).toFixed(1)+' m':'—'))));

    const eg=h('div',{style:{display:'flex',flexDirection:'column',gap:'1px'}});
    f.elements.forEach(e=>{const isSel=st.selected&&st.selected.id===e.id;eg.appendChild(h('div',{className:'listrow',style:{background:isSel?'#eef1f4':'transparent',opacity:this.isHidden(e.circuit)?0.5:1},onClick:()=>{this.st.selected={kind:'element',id:e.id};this.st.rightTab='props';this.allRender();}},h('span',{style:{width:'9px',height:'9px',borderRadius:'2px',flex:'none',background:this.circColor(e.circuit)}}),h('span',{style:{fontFamily:'var(--mono)',fontSize:'12.5px',fontWeight:600,minWidth:'42px'}},e.label),h('span',{style:{flex:'1',fontSize:'12.5px',color:'#374151',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},(TYPES[e.type]||{name:e.type}).name+(e.model?' · '+e.model:'')),h('span',{style:{fontSize:'11.5px',color:'#9aa1a8',fontFamily:'var(--mono)'}},e.watt?e.watt+' W':''),h('span',{title:'Status: '+(e.status||'Geplant'),style:{width:'8px',height:'8px',borderRadius:'50%',flex:'none',background:STATUS_COLOR[e.status||'Geplant']}})));});

  renderCircuits(){
    clear(dom.circuitList);
    const st=this.st, f=this.fl();
    st.circuits.forEach(c=>{
      const active=st.activeCircuit===c.id;
      const cnt=f.elements.filter(e=>e.circuit===c.id).length+f.cables.filter(k=>k.circuit===c.id).length;
      const row=h('div',{style:{display:'flex',alignItems:'center',gap:'7px',padding:'5px 7px',borderRadius:'7px',background:active?'#eef1f4':'transparent',boxShadow:active?('inset 0 0 0 1px '+c.color+'55'):'none',opacity:c.hidden?0.55:1}});
      row.appendChild(h('button',{className:'iconbtn',title:c.hidden?'Einblenden':'Ausblenden',style:{color:c.hidden?'#b4bac0':'#6b7280'},onClick:()=>this.toggleHide(c.id)},eyeIcon(!c.hidden)));
      row.appendChild(h('button',{title:'Farbe wechseln',style:{width:'16px',height:'16px',borderRadius:'4px',border:'1px solid rgba(0,0,0,.12)',cursor:'pointer',flex:'none',background:c.color},onClick:()=>this.cycleColor(c.id)}));
      row.style.cursor='pointer';

      name.addEventListener('input',e=>this.renameCircuit(c.id,e.target.value));
      name.addEventListener('blur',()=>{name.style.borderBottomColor='transparent';this.validateCircuitName(c.id);});
      name.addEventListener('focus',()=>{name.style.borderBottomColor=c.color;});
      name.addEventListener('mouseenter',()=>{if(document.activeElement!==name)name.style.borderBottomColor='#cdd2d7';});
      name.addEventListener('mouseleave',()=>{if(document.activeElement!==name)name.style.borderBottomColor='transparent';});
      name.addEventListener('dblclick',()=>name.select());
      name.addEventListener('keydown',e=>{if(e.key==='Enter')name.blur();});
      row.appendChild(name);
      row.appendChild(h('span',{title:'Als aktiven Stromkreis wählen',style:{fontSize:'11px',color:'#9aa1a8',fontFamily:'var(--mono)',cursor:'pointer'},onClick:()=>this.setActiveCircuit(c.id)},cnt));
      if(st.circuits.length>1)row.appendChild(h('button',{className:'iconbtn',title:'Stromkreis löschen',style:{fontSize:'15px',width:'18px',height:'18px'},onClick:()=>this.delCircuit(c.id)},'×'));
      row.addEventListener('click',e=>{ if(e.target.closest('input,button'))return; this.setActiveCircuit(c.id); });
      row.addEventListener('contextmenu',e=>{ e.preventDefault(); this.showCtx(e.clientX,e.clientY,[

      dom.circuitList.appendChild(row);
    });
  },

  wire(){
    dom.area.addEventListener('pointerdown',e=>this.onDown(e));
    dom.area.addEventListener('pointermove',e=>this.onMove(e));
    dom.area.addEventListener('pointerup',e=>this.onUp(e));
    dom.area.addEventListener('dblclick',e=>this.onDbl(e));
    dom.area.addEventListener('contextmenu',e=>this.onContext(e));
    dom.area.addEventListener('wheel',e=>this.onWheel(e),{passive:false});
    window.addEventListener('keydown',e=>this.onKey(e));
    window.addEventListener('keyup',e=>{if(e.code==='Space'){this._space=false;this.updateCursor();}});
    $('#zIn').onclick=()=>this.zoomBy(1.25); $('#zOut').onclick=()=>this.zoomBy(0.8); $('#zFit').onclick=()=>this.fit();
    $('#tabProps').onclick=()=>{this.st.rightTab='props';this.renderRight();}; $('#tabList').onclick=()=>{this.st.rightTab='list';this.renderRight();}; $('#tabCheck').onclick=()=>{this.st.rightTab='check';this.renderRight();};

    $('#btnVerteiler').onclick=()=>this.openVerteiler();

    $('#btnImport').onclick=()=>dom.file.click();
    dom.drop.onclick=()=>dom.file.click();

    ['dragenter','dragover'].forEach(ev=>dom.area.addEventListener(ev,e=>{e.preventDefault();dom.drop.classList.add('over');if(this.fl().planURL)dom.drop.style.display='flex';}));
    dom.area.addEventListener('dragleave',e=>{e.preventDefault();dom.drop.classList.remove('over');if(this.fl().planURL)dom.drop.style.display='none';});

  },
